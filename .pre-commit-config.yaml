exclude: |
  (?x)^(
      scripts/|
      assets/|
      vlmeval/config.py |
      vlmeval/dataset/utils/wemath.py |
      vlmeval/dataset/OmniDocBench/ |
      vlmeval/dataset/utils/megabench/ |
      vlmeval/dataset/utils/vgrpbench/ |
      vlmeval/dataset/utils/chartmimic/ |
      vlmeval/vlm/ola/ |
      vlmeval/vlm/ursa/ |
      vlmeval/vlm/ovis/ |
      vlmeval/dataset/utils/mme_reasoning.py
  )
repos:
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.2
    hooks:
      - id: flake8
        args:
          [
            "--max-line-length=120",
            "--ignore=W503",
          ]
        exclude: ^configs/
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf
        args: ["--style={column_limit=120}"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
